<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Rocket Racer — Test Suite</title>
  <style>
    body {
      background: #111;
      color: #ddd;
      font-family: monospace;
      font-size: 14px;
      padding: 20px;
      margin: 0;
    }
    h1 { color: #ffff44; margin-bottom: 4px; }
    h2 { color: #aaa; font-size: 13px; margin: 16px 0 4px; border-bottom: 1px solid #333; padding-bottom: 4px; }
    #summary { margin-top: 16px; font-size: 16px; font-weight: bold; }
    .pass { color: #44ff88; }
    .fail { color: #ff4444; }
    .result { padding: 2px 0; }
    .result::before { content: '  '; }
    .pass::before  { content: '  ✓ '; }
    .fail::before  { content: '  ✗ '; }
    #log { margin-top: 8px; }
  </style>
</head>
<body>
  <h1>Rocket Racer — Test Suite</h1>
  <p style="color:#888">Open browser console to see assertion failures in red.</p>
  <div id="log"></div>
  <div id="summary"></div>

  <!-- Load only the pure-logic modules (no canvas required) -->
  <script src="../js/constants.js"></script>
  <script src="../js/level.js"></script>
  <script src="test.js"></script>
</body>
</html>
