<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Rocket Racer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="game-container">
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    <div id="touch-controls">
      <button id="btn-left" class="touch-btn" aria-label="Steer Left">&#9664;</button>
      <button id="btn-accel" class="touch-btn" aria-label="Accelerate">&#9650;</button>
      <button id="btn-brake" class="touch-btn" aria-label="Brake">&#9660;</button>
      <button id="btn-right" class="touch-btn" aria-label="Steer Right">&#9654;</button>
    </div>
  </div>

  <!-- Load order: constants → audio → level → road → player → ui → game → debug → main -->
  <script src="js/constants.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/level.js"></script>
  <script src="js/road.js"></script>
  <script src="js/player.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/game.js"></script>
  <script src="js/debug.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
